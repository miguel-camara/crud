@if (productsResource.hasValue()) {
  <h1 class="text-2xl font-bold ml-8">Listado de productos</h1>
  <h3 class="text-lg ml-8">
    Total de productos
    <span class="text-accent">{{ productsResource.value().length }}</span>
  </h3>

  <div class="divider"></div>

  <div class="flex flex-col justify-center">
    <div class="flex gap-2 items-center ml-8 h-20">
      <div class="flex flex-1"></div>

      <button class="btn btn-soft btn-primary mr-8" routerLink="/product/new">
        Nuevo producto
      </button>
    </div>

    <!-- Listado -->
    <product-table
      class="mx-8"
      [products]="productsResource.value()"
      (deleteProduct)="delete($event)"
    />
  </div>
} @else {
  <app-loading />
}
